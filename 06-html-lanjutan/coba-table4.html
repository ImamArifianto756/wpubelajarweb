<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merging Table</title>
</head>
<body>
  <table border="1" cellspacing="0" cellpadding="10">
     <tr>
      <td rowspan="3">rowspan = 3</td>
      <td colspan="2">colspan = 2</td>
    </tr>
    <tr>
      <td>1,1</td>
      <td>1,2</td>
      <td>1,3</td>
    </tr>
   
    <tr>
      <td>1,1</td>
      <td>1,2</td>
      <td>1,3</td>
    </tr>
  </table>
</body>
</html>
