<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coba Element Form Didalam Tabel</title>
</head>
<body>
  <h1>Contoh elemen-elemen form</h1>

  <form action="">
    <table>
      <tr>
        <tr>
          <td align="right"> <label for="nama">Nama :</label></td>
          <td><input type="text" name="nama" placeholder="Masukkan Nama" id="nama" ></td>
        </tr>
        <tr>
          <td align="right"><label for="password">Password:</label></td>
          <td><input type="password" name="password" placeholder="Masukkan Password" id="password"></td>
        </tr>
        <tr>
          <td align="right"><label for="email">Email:</label></td>
          <td><input type="email" name="email" placeholder="Masukkan Email" id="email"></td>
        </tr>
        <tr>
          <td align="right"><label for="angka">Angka:</label></td>
          <td><input type="number" name="angka" placeholder="Masukkan Angka" id="angka"></td>
        </tr>
        <tr>
          <td align="right"><label for="Date">Date:</label></td>
          <td><input type="date" name="Date" placeholder="Masukkan Date" id="Date"></td>
        </tr>
        <tr>
          <td align="right"><label for="warna">Color:</label></td>
          <td><input type="color" name="warna" placeholder="Masukkan warna" id="warna"></td>
        </tr>
        <td colspan="2" align="right">
          <button type="submit">Submit</button>
        </td>
      </tr>
  </table>
   
    
    <br>

    <br>
    
    

    <br>
    
    

    <br>
    
    

    <br>
    
  </form>
</body>
</html>
