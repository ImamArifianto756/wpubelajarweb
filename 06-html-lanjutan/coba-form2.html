<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contoh Input Atribut Checkbox & Radio</title>
</head>
<body>
  <h1>Contoh Input Atribut, checkbox & radio</h1>
  <form>
    <label for="name">nama
      <input type="text" name="nama" id="nama" placeholder="Masukan Nama" autocomplete="off" autofocus required>
    </label>
    <br>

    <h3>Hobby :</h3>
    <label for="hobby1">Olahraga
      <input type="checkbox" name="hobby" id="hobby1" value="Olahraga" checked>
    </label>
    <label for="hobby2">Ngoding
      <input type="checkbox" name="hobby" id="hobby2" value="ngoding">
    </label>
    <br>
    <h3>Jenis Kelamin :</h3>
    <label for="pria">
      <input type="radio" name="jenis_kelamin" id="pria" value="pria" checked>
      Pria
    </label>
    <label for="wanita">
      <input type="radio" name="jenis_kelamin" id="wanita" value="wanita">
      Wanita  
    </label>
  
    <br>
    <button type="submit">Kirim !</button>
  </form>
</body>
</html>
