<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coba Element Form</title>
</head>
<body>
  <h1>Contoh elemen-elemen form</h1>

  <form action="">
    <label for="nama">Nama :</label>
    <input type="text" name="nama" placeholder="Masukkan Nama" id="nama" >
    <br>

    <label for="password">Password:</label>
    <input type="password" name="password" placeholder="Masukkan Password" id="password">
    <br>
    <label for="email">Email:</label>
    <input type="email" name="email" placeholder="Masukkan Email" id="email">

    <br>
    <label for="angka">Angka:</label>
    <input type="number" name="angka" placeholder="Masukkan Angka" id="angka">

    <br>
    <label for="Date">Date:</label>
    <input type="date" name="Date" placeholder="Masukkan Date" id="Date">

    <br>
    <label for="warna">Warna:</label>
    <input type="color" name="warna" placeholder="Masukkan warna" id="warna">

    <br>
    <button type="submit">Submit</button>
  </form>
</body>
</html>
